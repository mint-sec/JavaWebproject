spring:
  application:
    name: backend-service

server:
  port: 18081

logging:
  pattern:
    level: "[%X{traceId}] %5p"

app:
  simulation:
    step-seconds: 5
  algorithm:
    mode: mock-http-gateway
    version: mock-risk-v1
    fallback-enabled: true
    base-url: http://localhost:5001
    evaluate-path: /evaluate
