spring:
  application:
    name: backend-service
  profiles:
    default: mock
  config:
    import: optional:file:./backend-service/application-local.yml,optional:file:./application-local.yml

server:
  port: 18081

logging:
  pattern:
    level: "[%X{traceId}] %5p"

app:
  simulation:
    step-seconds: 5
  algorithm:
    mode: http-gateway
    version: mock-risk-v1
    fallback-enabled: true
    base-url: http://localhost:5001
    evaluate-path: /evaluate
    simulation-telemetry-path: /simulation/telemetry
